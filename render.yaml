services:
  - type: web
    name: xinqing-backend
    env: docker
    plan: free
    region: singapore
    branch: main

    # 持久磁盘（保存 SQLite 数据库）
    disk:
      name: persist-data
      mountPath: /opt/render/project/.persist/data
      sizeGB: 1

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: CORS_ORIGIN
        value: https://yuqingfuyue.onrender.com
      - key: VITE_API_URL
        value: /api
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "1000"

    # 自定义域名（部署后在 Render Dashboard 绑定）
    # domains:
    #   - yuqingfuyue.com
